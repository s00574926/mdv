<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mdv Rendering Sequence</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #5f6368;
      --line: #294866;
      --grid: #9bb2c5;
      --canvas: #ffffff;
      --band: #eef3f4;
      --blue-fill: #dceeff;
      --blue-stroke: #2f6fa8;
      --green-fill: #dcf7e7;
      --green-stroke: #2d9a6b;
      --orange-fill: #fff0d9;
      --orange-stroke: #c96b2c;
      --purple-fill: #efe7ff;
      --purple-stroke: #7d4bb0;
      --gray-fill: #f4f4f4;
      --gray-stroke: #c7c7c7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: #f7fafc;
    }

    main {
      width: min(100%, 1720px);
      margin: 0 auto;
      padding: 30px 24px 44px;
      box-sizing: border-box;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 34px;
      line-height: 1.15;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px auto 22px;
      max-width: 980px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .diagram-wrap {
      overflow-x: auto;
      padding: 8px;
      background: var(--canvas);
      border: 1px solid #d7e0e8;
      border-radius: 12px;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 1500px;
      height: auto;
      background: var(--canvas);
    }

    .participant rect {
      rx: 12;
      ry: 12;
      stroke-width: 1.6;
    }

    .participant .label {
      font-size: 16px;
      font-weight: 760;
      fill: var(--ink);
    }

    .participant .note,
    .small-note,
    .source {
      font-size: 12px;
      fill: var(--muted);
    }

    .lifeline {
      stroke: var(--grid);
      stroke-width: 1.4;
      stroke-dasharray: 6 8;
    }

    .activation {
      fill: #f8fbfd;
      stroke: #9bb2c5;
      stroke-width: 1.2;
      rx: 5;
      ry: 5;
    }

    .call {
      stroke: var(--line);
      stroke-width: 2.2;
      fill: none;
      marker-end: url(#arrow);
    }

    .return {
      stroke: var(--line);
      stroke-width: 2;
      stroke-dasharray: 7 6;
      fill: none;
      marker-end: url(#arrow);
    }

    .self-call {
      stroke: #c96b2c;
      stroke-width: 2.1;
      fill: none;
      marker-end: url(#arrow-orange);
    }

    .watcher {
      stroke: #b23a3f;
      stroke-width: 2;
      stroke-dasharray: 7 6;
      fill: none;
      marker-end: url(#arrow-red);
    }

    .label-bg {
      fill: transparent;
      stroke: none;
      stroke-width: 0;
      rx: 7;
      ry: 7;
    }

    .edge-label {
      font-size: 13px;
      font-weight: 650;
      fill: #18334c;
    }

    .band-title {
      font-size: 15px;
      font-weight: 760;
      fill: var(--ink);
    }

    .band-note {
      font-size: 12px;
      fill: var(--muted);
    }

    .step-badge {
      fill: #ffffff;
      stroke: #294866;
      stroke-width: 1.3;
    }

    .step-number {
      font-size: 12px;
      font-weight: 800;
      fill: #294866;
    }

    .note-card rect {
      fill: #fffdf6;
      stroke: #d8be72;
      stroke-width: 1.3;
      rx: 10;
      ry: 10;
    }

    .note-card .title {
      font-size: 14px;
      font-weight: 780;
      fill: #5b4300;
    }

    .note-card .body {
      font-size: 12px;
      fill: #4b5563;
    }
  </style>
</head>
<body>
  <main>
    <h1>mdv Markdown Rendering Sequence</h1>
    <p class="subtitle">
      Source-derived interaction path from a Markdown open/edit action through Rust rendering, trusted preview HTML injection, and Mermaid hydration.
    </p>

    <div class="diagram-wrap" aria-label="Sequence diagram for mdv rendering">
      <svg viewBox="0 0 1640 1390" role="img" aria-labelledby="diagram-title diagram-desc">
        <title id="diagram-title">mdv Markdown Rendering Sequence</title>
        <desc id="diagram-desc">Sequence diagram showing saved-file rendering and live editor rendering in mdv.</desc>

        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#294866"></path>
          </marker>
          <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#c96b2c"></path>
          </marker>
          <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b23a3f"></path>
          </marker>
        </defs>

        <g class="participant" transform="translate(36 36)">
          <rect width="160" height="72" fill="#f4f4f4" stroke="#c7c7c7"></rect>
          <text class="label" x="80" y="29" text-anchor="middle">User / event</text>
          <text class="note" x="80" y="51" text-anchor="middle">open, type, watch</text>
        </g>
        <g class="participant" transform="translate(260 36)">
          <rect width="178" height="72" fill="#dceeff" stroke="#2f6fa8"></rect>
          <text class="label" x="89" y="29" text-anchor="middle">Frontend UI</text>
          <text class="note" x="89" y="51" text-anchor="middle">src/main.ts</text>
        </g>
        <g class="participant" transform="translate(500 36)">
          <rect width="178" height="72" fill="#efe7ff" stroke="#7d4bb0"></rect>
          <text class="label" x="89" y="29" text-anchor="middle">Tauri command</text>
          <text class="note" x="89" y="51" text-anchor="middle">commands.rs</text>
        </g>
        <g class="participant" transform="translate(740 36)">
          <rect width="178" height="72" fill="#dcf7e7" stroke="#2d9a6b"></rect>
          <text class="label" x="89" y="29" text-anchor="middle">Workspace</text>
          <text class="note" x="89" y="51" text-anchor="middle">workspace.rs</text>
        </g>
        <g class="participant" transform="translate(980 36)">
          <rect width="178" height="72" fill="#fff0d9" stroke="#c96b2c"></rect>
          <text class="label" x="89" y="29" text-anchor="middle">State / cache</text>
          <text class="note" x="89" y="51" text-anchor="middle">state.rs</text>
        </g>
        <g class="participant" transform="translate(1220 36)">
          <rect width="178" height="72" fill="#fff0d9" stroke="#c96b2c"></rect>
          <text class="label" x="89" y="29" text-anchor="middle">Markdown renderer</text>
          <text class="note" x="89" y="51" text-anchor="middle">markdown.rs</text>
        </g>
        <g class="participant" transform="translate(1460 36)">
          <rect width="178" height="72" fill="#dceeff" stroke="#2f6fa8"></rect>
          <text class="label" x="89" y="29" text-anchor="middle">Preview DOM</text>
          <text class="note" x="89" y="51" text-anchor="middle">view.ts + Mermaid</text>
        </g>

        <line class="lifeline" x1="116" y1="108" x2="116" y2="1260"></line>
        <line class="lifeline" x1="349" y1="108" x2="349" y2="1260"></line>
        <line class="lifeline" x1="589" y1="108" x2="589" y2="1260"></line>
        <line class="lifeline" x1="829" y1="108" x2="829" y2="1260"></line>
        <line class="lifeline" x1="1069" y1="108" x2="1069" y2="1260"></line>
        <line class="lifeline" x1="1309" y1="108" x2="1309" y2="1260"></line>
        <line class="lifeline" x1="1549" y1="108" x2="1549" y2="1260"></line>

        <rect class="activation" x="340" y="156" width="18" height="1030"></rect>
        <rect class="activation" x="820" y="252" width="18" height="360"></rect>
        <rect class="activation" x="820" y="760" width="18" height="220"></rect>
        <rect class="activation" x="1300" y="304" width="18" height="178"></rect>
        <rect class="activation" x="1300" y="822" width="18" height="120"></rect>
        <rect class="activation" x="1540" y="572" width="18" height="650"></rect>

        <rect x="30" y="135" width="1580" height="470" rx="14" fill="#f7fbff" fill-opacity="0.74" stroke="#c8dbea"></rect>
        <text class="band-title" x="54" y="164">alt saved Markdown file</text>
        <text class="band-note" x="54" y="184">Menu, drag/drop, recent file, or relative Markdown link resolves to the same command path.</text>

        <circle class="step-badge" cx="64" cy="226" r="13"></circle>
        <text class="step-number" x="64" y="231" text-anchor="middle">1</text>
        <line class="call" x1="116" y1="226" x2="340" y2="226"></line>
        <rect class="label-bg" x="167" y="205" width="124" height="25"></rect>
        <text class="edge-label" x="229" y="222" text-anchor="middle">open file path</text>

        <line class="call" x1="358" y1="282" x2="580" y2="282"></line>
        <rect class="label-bg" x="405" y="261" width="128" height="25"></rect>
        <text class="edge-label" x="469" y="278" text-anchor="middle">invoke open_markdown</text>

        <line class="call" x1="598" y1="338" x2="820" y2="338"></line>
        <rect class="label-bg" x="641" y="317" width="136" height="25"></rect>
        <text class="edge-label" x="709" y="334" text-anchor="middle">open_markdown_path</text>

        <line class="call" x1="838" y1="394" x2="1300" y2="394"></line>
        <rect class="label-bg" x="1004" y="373" width="130" height="25"></rect>
        <text class="edge-label" x="1069" y="390" text-anchor="middle">render_file(path)</text>

        <path class="self-call" d="M 1318 438 C 1410 438 1410 486 1318 486"></path>
        <rect class="label-bg" x="1348" y="441" width="158" height="40"></rect>
        <text class="edge-label" x="1427" y="458" text-anchor="middle">read, rewrite Mermaid</text>
        <text class="edge-label" x="1427" y="475" text-anchor="middle">parse, rewrite links</text>

        <line class="return" x1="1300" y1="530" x2="838" y2="530"></line>
        <rect class="label-bg" x="1001" y="509" width="136" height="25"></rect>
        <text class="edge-label" x="1069" y="526" text-anchor="middle">RenderedDocument</text>

        <line class="call" x1="838" y1="574" x2="1060" y2="574"></line>
        <rect class="label-bg" x="888" y="553" width="122" height="25"></rect>
        <text class="edge-label" x="949" y="570" text-anchor="middle">cache rendered</text>

        <line class="return" x1="820" y1="620" x2="598" y2="620"></line>
        <rect class="label-bg" x="647" y="599" width="124" height="25"></rect>
        <text class="edge-label" x="709" y="616" text-anchor="middle">WorkspacePayload</text>

        <line class="return" x1="580" y1="660" x2="358" y2="660"></line>
        <rect class="label-bg" x="407" y="639" width="124" height="25"></rect>
        <text class="edge-label" x="469" y="656" text-anchor="middle">payload to UI</text>

        <rect x="30" y="690" width="1580" height="470" rx="14" fill="#fbfff7" fill-opacity="0.74" stroke="#cce4c9"></rect>
        <text class="band-title" x="54" y="719">alt live editor / untitled document</text>
        <text class="band-note" x="54" y="739">Typing updates session content first, then current_workspace renders the editor text as a trusted preview document.</text>

        <circle class="step-badge" cx="64" cy="776" r="13"></circle>
        <text class="step-number" x="64" y="781" text-anchor="middle">2</text>
        <line class="call" x1="116" y1="776" x2="340" y2="776"></line>
        <rect class="label-bg" x="174" y="755" width="110" height="25"></rect>
        <text class="edge-label" x="229" y="772" text-anchor="middle">type Markdown</text>

        <path class="self-call" d="M 358 820 C 452 820 452 868 358 868"></path>
        <rect class="label-bg" x="383" y="823" width="146" height="40"></rect>
        <text class="edge-label" x="456" y="840" text-anchor="middle">queueEditorUpdate</text>
        <text class="edge-label" x="456" y="857" text-anchor="middle">150 ms debounce</text>

        <line class="call" x1="358" y1="906" x2="580" y2="906"></line>
        <rect class="label-bg" x="392" y="885" width="154" height="25"></rect>
        <text class="edge-label" x="469" y="902" text-anchor="middle">update_document_content</text>

        <line class="call" x1="598" y1="956" x2="820" y2="956"></line>
        <rect class="label-bg" x="638" y="935" width="142" height="25"></rect>
        <text class="edge-label" x="709" y="952" text-anchor="middle">update session text</text>

        <line class="call" x1="838" y1="1002" x2="1300" y2="1002"></line>
        <rect class="label-bg" x="997" y="981" width="144" height="25"></rect>
        <text class="edge-label" x="1069" y="998" text-anchor="middle">untitled_document</text>

        <path class="self-call" d="M 1318 1038 C 1410 1038 1410 1086 1318 1086"></path>
        <rect class="label-bg" x="1348" y="1041" width="158" height="40"></rect>
        <text class="edge-label" x="1427" y="1058" text-anchor="middle">rewrite Mermaid</text>
        <text class="edge-label" x="1427" y="1075" text-anchor="middle">comrak to HTML</text>

        <line class="return" x1="1300" y1="1118" x2="598" y2="1118"></line>
        <rect class="label-bg" x="888" y="1097" width="122" height="25"></rect>
        <text class="edge-label" x="949" y="1114" text-anchor="middle">payload returns</text>

        <circle class="step-badge" cx="301" cy="1184" r="13"></circle>
        <text class="step-number" x="301" y="1189" text-anchor="middle">3</text>
        <line class="call" x1="358" y1="1184" x2="1540" y2="1184"></line>
        <rect class="label-bg" x="783" y="1163" width="332" height="25"></rect>
        <text class="edge-label" x="949" y="1180" text-anchor="middle">renderWorkspace -> renderPreview -> setTrustedPreviewHtml</text>

        <path class="self-call" d="M 1558 1220 C 1618 1220 1618 1260 1558 1260"></path>
        <rect class="label-bg" x="1417" y="1223" width="158" height="40"></rect>
        <text class="edge-label" x="1496" y="1240" text-anchor="middle">hydrate assets</text>
        <text class="edge-label" x="1496" y="1257" text-anchor="middle">renderMermaid()</text>

        <line class="watcher" x1="1060" y1="1066" x2="358" y2="1066"></line>
        <rect class="label-bg" x="617" y="1045" width="184" height="25"></rect>
        <text class="edge-label" x="709" y="1062" text-anchor="middle">watcher invalidates cache</text>

        <g class="note-card" transform="translate(48 1272)">
          <rect width="360" height="80"></rect>
          <text class="title" x="18" y="28">Trust boundary</text>
          <text class="body" x="18" y="50">setTrustedPreviewHtml only accepts</text>
          <text class="body" x="18" y="68">trusted-local-markdown-preview payloads.</text>
        </g>

        <text class="source" x="430" y="1322">Grounded in src/main.ts: renderWorkspace/renderPreview/renderMermaid, and src/view.ts: setTrustedPreviewHtml.</text>
        <text class="source" x="430" y="1342">Rust path: src-tauri/src/workspace.rs current_workspace/open_markdown_with_directory, and src-tauri/src/markdown.rs render_file/render_markdown.</text>
      </svg>
    </div>
  </main>
</body>
</html>
