<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>mdv Architecture Diagram</title>
<style>
  :root {
    --ink: #111827;
    --muted: #5f6368;
    --line: #294866;
    --blue-fill: #dceeff;
    --blue-stroke: #2f6fa8;
    --green-fill: #dcf7e7;
    --green-stroke: #2d9a6b;
    --orange-fill: #fff0d9;
    --orange-stroke: #c96b2c;
    --yellow-fill: #fff5c7;
    --yellow-stroke: #c98a18;
    --purple-fill: #efe7ff;
    --purple-stroke: #7d4bb0;
    --gray-fill: #f4f4f4;
    --gray-stroke: #c7c7c7;
    --band: #eef3f4;
  }

  body {
    margin: 0;
    background: #ffffff;
    color: var(--ink);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .wrap {
    padding: 28px;
  }

  svg {
    display: block;
    width: 100%;
    max-width: 1780px;
    height: auto;
    margin: 0 auto;
    background: #ffffff;
  }

  .title {
    font-size: 42px;
    font-weight: 850;
    fill: var(--ink);
  }

  .subtitle {
    font-size: 20px;
    fill: var(--muted);
  }

  .band-label {
    font-size: 18px;
    font-weight: 750;
    fill: #334155;
  }

  .box {
    box-sizing: border-box;
    height: 100%;
    border: 2px solid var(--blue-stroke);
    border-radius: 10px;
    background: var(--blue-fill);
    padding: 14px 16px;
    overflow: hidden;
  }

  .box.green { border-color: var(--green-stroke); background: var(--green-fill); }
  .box.orange { border-color: var(--orange-stroke); background: var(--orange-fill); }
  .box.yellow { border-color: var(--yellow-stroke); background: var(--yellow-fill); }
  .box.purple { border-color: var(--purple-stroke); background: var(--purple-fill); }
  .box.gray { border-color: var(--gray-stroke); background: var(--gray-fill); }

  .label {
    display: block;
    font-size: 18px;
    font-weight: 800;
    line-height: 1.16;
    text-align: center;
  }

  .note {
    display: block;
    margin-top: 7px;
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.22;
    text-align: center;
  }

  .mono {
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }

  .caption {
    color: #334155;
    font-size: 15px;
    line-height: 1.35;
  }

  .caption strong {
    color: var(--ink);
  }
</style>
<div class="wrap">
<svg viewBox="0 0 1780 1120" role="img" aria-label="mdv architecture diagram">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#294866"></path>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b23a3f"></path>
    </marker>
  </defs>

  <text class="title" x="890" y="58" text-anchor="middle">mdv: Markdown Diagram Viewer Architecture</text>
  <text class="subtitle" x="890" y="96" text-anchor="middle">Source-derived runtime map of the Tauri command boundary, Markdown renderer, workspace state, and WebView preview.</text>

  <rect x="70" y="140" width="1640" height="210" rx="18" fill="#eef3f4" stroke="#ffffff" stroke-width="2"></rect>
  <text class="band-label" x="100" y="176">Frontend WebView - src/*.ts</text>

  <rect x="70" y="420" width="1640" height="230" rx="18" fill="#eef3f4" stroke="#ffffff" stroke-width="2"></rect>
  <text class="band-label" x="100" y="456">Rust application core - src-tauri/src/*.rs</text>

  <rect x="70" y="720" width="1640" height="230" rx="18" fill="#eef3f4" stroke="#ffffff" stroke-width="2"></rect>
  <text class="band-label" x="100" y="756">State, filesystem, and side effects</text>

  <rect x="70" y="986" width="1640" height="88" rx="18" fill="#ffffff" stroke="#d8dee6" stroke-width="2"></rect>
  <text class="band-label" x="100" y="1020">Build and verification</text>

  <foreignObject x="110" y="214" width="220" height="104">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box">
      <span class="label">User actions</span>
      <span class="note">open, drop, edit, save, tabs, shortcuts</span>
    </div>
  </foreignObject>

  <foreignObject x="398" y="204" width="260" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box green">
      <span class="label">UI controller</span>
      <span class="note mono">src/main.ts</span>
      <span class="note">events, menus, editor debounce, invoke calls</span>
    </div>
  </foreignObject>

  <foreignObject x="760" y="204" width="260" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box">
      <span class="label">View renderer</span>
      <span class="note mono">src/view.ts</span>
      <span class="note">tabs, explorer, editor, preview, outline</span>
    </div>
  </foreignObject>

  <foreignObject x="1122" y="204" width="260" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box purple">
      <span class="label">Mermaid runtime</span>
      <span class="note mono">mermaid + theme.ts</span>
      <span class="note">render blocks, zoom, theme refresh, SVG export</span>
    </div>
  </foreignObject>

  <foreignObject x="1480" y="204" width="190" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box orange">
      <span class="label">Local links</span>
      <span class="note mono">asset: / mdv-local-*</span>
      <span class="note">assets and Markdown links</span>
    </div>
  </foreignObject>

  <line x1="330" y1="266" x2="398" y2="266" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="658" y1="266" x2="760" y2="266" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="1020" y1="266" x2="1122" y2="266" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="1382" y1="266" x2="1480" y2="266" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>

  <foreignObject x="180" y="492" width="260" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box orange">
      <span class="label">Command boundary</span>
      <span class="note mono">commands.rs</span>
      <span class="note">open, select, save, update, copy, exit</span>
    </div>
  </foreignObject>

  <foreignObject x="560" y="492" width="280" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box green">
      <span class="label">Workspace core</span>
      <span class="note mono">workspace.rs</span>
      <span class="note">opens files, mutates session, syncs watchers</span>
    </div>
  </foreignObject>

  <foreignObject x="960" y="482" width="300" height="144">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box">
      <span class="label">Markdown renderer</span>
      <span class="note mono">markdown.rs + trusted_preview.rs</span>
      <span class="note">comrak HTML, Mermaid rewrite, local refs, trust marker</span>
    </div>
  </foreignObject>

  <foreignObject x="1380" y="492" width="260" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box yellow">
      <span class="label">Workspace payload</span>
      <span class="note mono">workspace_payload.rs</span>
      <span class="note">document, editor, explorer, recent paths, tabs</span>
    </div>
  </foreignObject>

  <path d="M528 328 L528 386 L310 386 L310 492" fill="none" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></path>
  <text x="420" y="380" text-anchor="middle" fill="#294866" font-size="14" class="mono">invoke()</text>
  <line x1="440" y1="554" x2="560" y2="554" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="840" y1="554" x2="960" y2="554" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="1260" y1="554" x2="1380" y2="554" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <path d="M1510 492 L1510 386 L890 386 L890 328" fill="none" stroke="#294866" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-blue)"></path>
  <text x="1200" y="380" text-anchor="middle" fill="#294866" font-size="14" class="mono">WorkspacePayload</text>

  <foreignObject x="140" y="792" width="280" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box green">
      <span class="label">Session model</span>
      <span class="note mono">workspace_session.rs</span>
      <span class="note">documents, active tab, untitled content</span>
    </div>
  </foreignObject>

  <foreignObject x="520" y="792" width="280" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box yellow">
      <span class="label">AppState cache</span>
      <span class="note mono">state.rs</span>
      <span class="note">rendered docs, explorer roots, recent files</span>
    </div>
  </foreignObject>

  <foreignObject x="970" y="792" width="280" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box">
      <span class="label">Explorer scanner</span>
      <span class="note mono">explorer.rs</span>
      <span class="note">Markdown-only tree and first .md file</span>
    </div>
  </foreignObject>

  <foreignObject x="1280" y="792" width="280" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box purple">
      <span class="label">File watchers</span>
      <span class="note mono">watcher.rs / notify</span>
      <span class="note">coalesced document and explorer refresh</span>
    </div>
  </foreignObject>

  <foreignObject x="1588" y="792" width="150" height="124">
    <div xmlns="http://www.w3.org/1999/xhtml" class="box gray">
      <span class="label">Host OS</span>
      <span class="note mono">*.md, assets</span>
      <span class="note">dialogs, filesystem, clipboard</span>
    </div>
  </foreignObject>

  <line x1="310" y1="616" x2="310" y2="792" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="700" y1="616" x2="700" y2="792" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="1110" y1="626" x2="1110" y2="792" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="1510" y1="616" x2="1510" y2="792" stroke="#294866" stroke-width="3" marker-end="url(#arrow-blue)"></line>
  <line x1="1588" y1="854" x2="1560" y2="854" stroke="#b23a3f" stroke-width="3" marker-end="url(#arrow-red)"></line>

  <foreignObject x="118" y="1036" width="1540" height="24">
    <div xmlns="http://www.w3.org/1999/xhtml" class="caption">
      <strong>Build:</strong> Vite builds <span class="mono">src/</span> into <span class="mono">dist/</span>; Tauri bundles via <span class="mono">beforeBuildCommand: npm run build</span>.
      <strong>Tests:</strong> frontend unit tests plus Rust coverage for Markdown, explorer, workspace, watcher, and clipboard behavior.
    </div>
  </foreignObject>
</svg>
</div>
</html>
