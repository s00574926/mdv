<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdv</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="titlebar">
        <div class="titlebar-leading">
          <div class="titlebar-menu-wrap">
            <button
              id="titlebar-menu-button"
              class="titlebar-menu-button"
              type="button"
              aria-label="Open app menu"
              aria-controls="titlebar-menu"
              aria-expanded="false"
            >
              <span class="burger-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
            <div id="titlebar-menu" class="titlebar-menu" hidden>
              <button
                type="button"
                id="titlebar-menu-new"
                class="titlebar-menu-item"
                data-menu-action="new"
              >
                <span class="titlebar-menu-item-label">New</span>
                <span class="titlebar-menu-item-shortcut" data-shortcut-action="new" aria-hidden="true"></span>
              </button>
              <button
                type="button"
                id="titlebar-menu-save"
                class="titlebar-menu-item"
                data-menu-action="save"
                hidden
              >
                <span class="titlebar-menu-item-label">Save</span>
                <span class="titlebar-menu-item-shortcut" data-shortcut-action="save" aria-hidden="true"></span>
              </button>
              <button
                type="button"
                id="titlebar-menu-save-as"
                class="titlebar-menu-item"
                data-menu-action="save-as"
                hidden
              >
                <span class="titlebar-menu-item-label">Save As...</span>
                <span class="titlebar-menu-item-shortcut" data-shortcut-action="save-as" aria-hidden="true"></span>
              </button>
              <button
                type="button"
                id="titlebar-menu-open"
                class="titlebar-menu-item"
                data-menu-action="open"
              >
                <span class="titlebar-menu-item-label">Open...</span>
                <span class="titlebar-menu-item-shortcut" data-shortcut-action="open" aria-hidden="true"></span>
              </button>
              <button
                type="button"
                id="titlebar-menu-open-folder"
                class="titlebar-menu-item"
                data-menu-action="open-folder"
              >
                <span class="titlebar-menu-item-label">Open Folder...</span>
                <span class="titlebar-menu-item-shortcut" data-shortcut-action="open-folder" aria-hidden="true"></span>
              </button>
              <button
                type="button"
                id="titlebar-menu-open-recent"
                class="titlebar-menu-item titlebar-submenu-toggle"
                aria-controls="titlebar-menu-recent"
                aria-expanded="false"
              >
                <span class="titlebar-menu-item-label">Open Recent</span>
                <span class="titlebar-submenu-chevron" aria-hidden="true">></span>
              </button>
              <div id="titlebar-menu-recent" class="titlebar-menu-group titlebar-menu-nested" hidden></div>
              <div class="titlebar-menu-separator" aria-hidden="true"></div>
              <button
                type="button"
                id="titlebar-menu-quit"
                class="titlebar-menu-item"
                data-menu-action="quit"
              >
                <span class="titlebar-menu-item-label">Quit</span>
                <span class="titlebar-menu-item-shortcut" aria-hidden="true">Alt+F4</span>
              </button>
            </div>
          </div>
          <nav id="document-tabs-panel" class="document-tabs-panel titlebar-tabs-panel" hidden>
            <div id="document-tabs" class="document-tabs titlebar-tabs" role="tablist"></div>
          </nav>
          <div class="titlebar-caption" data-tauri-drag-region aria-hidden="true"></div>
        </div>
        <div class="titlebar-controls">
          <button
            id="titlebar-document-nav"
            class="titlebar-control-button titlebar-document-nav-button"
            type="button"
            aria-label="Show document navigation"
            aria-controls="document-nav-panel"
            aria-expanded="false"
          >
            <span class="titlebar-document-nav-icon" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
          <button
            id="titlebar-theme"
            class="titlebar-control-button titlebar-theme-button"
            type="button"
            aria-label="Switch theme"
          >
            <span class="titlebar-theme-icon" aria-hidden="true">
              <svg class="titlebar-theme-glyph titlebar-theme-glyph-sun" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="2.8" stroke="currentColor" stroke-width="1.4"></circle>
                <path
                  d="M8 1.5v1.8M8 12.7v1.8M1.5 8h1.8M12.7 8h1.8M3.4 3.4l1.3 1.3M11.3 11.3l1.3 1.3M12.6 3.4l-1.3 1.3M4.7 11.3l-1.3 1.3"
                  stroke="currentColor"
                  stroke-width="1.4"
                  stroke-linecap="round"
                ></path>
              </svg>
              <svg class="titlebar-theme-glyph titlebar-theme-glyph-moon" viewBox="0 0 16 16" fill="none">
                <path
                  d="M10.9 1.8a5.8 5.8 0 1 0 3.3 10.5A6.4 6.4 0 1 1 10.9 1.8Z"
                  stroke="currentColor"
                  stroke-width="1.4"
                  stroke-linejoin="round"
                ></path>
              </svg>
            </span>
          </button>
          <button
            id="titlebar-minimize"
            class="titlebar-control-button"
            type="button"
            aria-label="Minimize window"
          >
            <span class="window-icon window-icon-minimize" aria-hidden="true"></span>
          </button>
          <button
            id="titlebar-maximize"
            class="titlebar-control-button"
            type="button"
            aria-label="Maximize window"
          >
            <span id="titlebar-maximize-icon" class="window-icon window-icon-maximize" aria-hidden="true"></span>
          </button>
          <button
            id="titlebar-close"
            class="titlebar-control-button titlebar-control-button-close"
            type="button"
            aria-label="Close window"
          >
            <span class="window-icon window-icon-close" aria-hidden="true"></span>
          </button>
        </div>
      </header>
      <main id="app-root" class="app-root">
        <nav id="explorer-panel" class="explorer-panel" hidden>
          <div id="explorer-tree" class="explorer-tree" role="tree"></div>
        </nav>
        <section class="workspace-pane">
          <section id="workspace-content" class="workspace-content">
            <section id="editor-panel" class="workspace-editor-panel" hidden>
              <textarea
                id="editor"
                class="workspace-editor"
                aria-label="Untitled Markdown editor"
                placeholder="Paste or type Markdown here"
              ></textarea>
            </section>
            <article id="preview" class="markdown-body" aria-live="polite"></article>
          </section>
          <aside
            id="document-nav-panel"
            class="document-nav-panel"
            aria-label="Document navigation"
            hidden
          >
            <div class="document-find-row">
              <input
                id="document-find-input"
                class="document-find-input"
                type="search"
                aria-label="Find in document"
                autocomplete="off"
                spellcheck="false"
                placeholder="Find"
              />
              <button
                id="document-find-previous"
                class="document-nav-icon-button"
                type="button"
                aria-label="Previous match"
              >
                <span aria-hidden="true">^</span>
              </button>
              <button
                id="document-find-next"
                class="document-nav-icon-button"
                type="button"
                aria-label="Next match"
              >
                <span aria-hidden="true">v</span>
              </button>
            </div>
            <div id="document-find-count" class="document-find-count" aria-live="polite"></div>
            <nav id="document-outline" class="document-outline" aria-label="Table of contents"></nav>
          </aside>
        </section>
      </main>
      <div id="drop-overlay" class="drop-overlay" role="status" aria-live="polite" hidden>
        <div class="drop-overlay-surface">
          <div class="drop-overlay-icon" aria-hidden="true"></div>
          <div id="drop-overlay-title" class="drop-overlay-title">Drop to open</div>
          <div id="drop-overlay-detail" class="drop-overlay-detail">Markdown files or folders</div>
        </div>
      </div>
      <div id="preview-context-menu" class="context-menu" role="menu" hidden>
        <button
          id="preview-context-menu-copy-mermaid"
          class="context-menu-item"
          type="button"
          role="menuitem"
        >
          Copy Mermaid as PNG
        </button>
        <button
          id="preview-context-menu-copy-powerpoint"
          class="context-menu-item"
          type="button"
          role="menuitem"
        >
          Copy Mermaid as PowerPoint Slide
        </button>
      </div>
    </div>
  </body>
</html>
